<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Payment Fraud Detection</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#f4f6f9;
font-family:Arial, Helvetica, sans-serif;
}

.navbar{
background:#1e3a8a;
}

.navbar-brand{
color:white !important;
font-weight:bold;
}

.container-box{
margin-top:50px;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0px 0px 15px rgba(0,0,0,0.1);
}

.result-box{
margin-top:25px;
padding:15px;
border-radius:8px;
font-weight:bold;
font-size:18px;
}

.footer{
margin-top:40px;
text-align:center;
color:#888;
font-size:14px;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg">
<div class="container">

<a class="navbar-brand" href="#">
Fraud Detection System
</a>

</div>
</nav>

<!-- Main Container -->

<div class="container">

<div class="container-box">

<h2 class="text-center mb-4">
Online Payment Fraud Detection
</h2>

<p class="text-center text-muted">
Enter transaction details to detect fraudulent activity
</p>

<form action="/predict" method="post">

<!-- Row 1 -->

<div class="row mb-3">

<div class="col-md-6">

<label class="form-label">
Transaction Amount
</label>

<input type="number"
name="amount"
class="form-control"
placeholder="Enter transaction amount"
required>

</div>

<div class="col-md-6">

<label class="form-label">
Transaction Time
</label>

<input type="number"
name="time"
class="form-control"
placeholder="Transaction time"
required>

</div>

</div>

<!-- Row 2 -->

<div class="row mb-3">

<div class="col-md-6">

<label class="form-label">
Card Type
</label>

<select name="card" class="form-select">

<option>Visa</option>
<option>MasterCard</option>
<option>American Express</option>

</select>

</div>

<div class="col-md-6">

<label class="form-label">
Device Type
</label>

<select name="device" class="form-select">

<option>Mobile</option>
<option>Desktop</option>

</select>

</div>

</div>

<!-- Row 3 -->

<div class="row mb-3">

<div class="col-md-6">

<label class="form-label">
Transaction Location
</label>

<input type="text"
name="location"
class="form-control"
placeholder="City / Country">

</div>

<div class="col-md-6">

<label class="form-label">
Transaction Frequency
</label>

<input type="number"
name="freq"
class="form-control"
placeholder="Number of transactions">

</div>

</div>

<!-- Button -->

<div class="text-center">

<button type="submit"
class="btn btn-primary btn-lg">

Check Transaction

</button>

</div>

</form>

<!-- Prediction Result -->

{% if prediction_text %}

<div class="result-box alert alert-warning text-center">

{{ prediction_text }}

</div>

{% endif %}

</div>

</div>

<!-- Footer -->

<div class="footer">

<p>
AI Based Financial Fraud Detection System
</p>

</div>

</body>

</html>
